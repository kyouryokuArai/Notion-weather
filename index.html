<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#ffffff; height:100%; }
body { font-family:'Inter',sans-serif; display:flex; justify-content:center; align-items:center; padding:16px; }
.card {
  width:100%; padding:36px 48px;
  background:transparent; border-radius:20px; border:none;
  display:flex; flex-direction:column; gap:24px;
  position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:220px; height:220px;
  background:radial-gradient(circle, rgba(57,255,20,0.04) 0%, transparent 70%);
  pointer-events:none;
}
.top-row { display:flex; flex-direction:column; gap:4px; }
.city { font-size:10px; font-weight:400; letter-spacing:0.25em; color:#ff66a8; text-transform:uppercase; }
.label { font-size:11px; font-weight:500; letter-spacing:0.3em; color:#ffff00; text-transform:uppercase; text-shadow:0 0 8px rgba(255,255,0,0.7); }

.main-row { display:flex; align-items:center; justify-content:space-between; gap:24px; }

/* 左：今日 */
.today { display:flex; align-items:center; gap:16px; }
.cur-icon { font-size:64px; line-height:1; }
.cur-info { display:flex; flex-direction:column; gap:4px; }
.cur-temp { font-family:'DM Serif Display',serif; font-size:80px; line-height:1; color:#f0f0f0; letter-spacing:-4px; }
.cur-temp sup { font-size:28px; vertical-align:super; color:#888; }
.cur-desc { font-size:10px; letter-spacing:0.2em; color:#00cfff; text-transform:uppercase; text-shadow:0 0 8px rgba(0,207,255,0.6); }
.cur-range { font-size:11px; color:#555; letter-spacing:0.05em; }
.cur-range span { color:#888; }

/* 仕切り */
.divider-v { width:1px; height:80px; background:#2a2a2a; flex-shrink:0; }

/* 右：明日 */
.tomorrow { display:flex; flex-direction:column; align-items:center; gap:8px; min-width:90px; }
.tmr-label { font-size:9px; letter-spacing:0.25em; color:#ffff00; text-transform:uppercase; text-shadow:0 0 6px rgba(255,255,0,0.5); }
.tmr-icon { font-size:36px; line-height:1; }
.tmr-temps { display:flex; gap:8px; align-items:baseline; }
.tmr-high { font-size:20px; font-weight:500; color:#f0f0f0; }
.tmr-low { font-size:14px; font-weight:300; color:#555; }
.tmr-precip { font-size:10px; color:#39ff14; letter-spacing:0.1em; text-shadow:0 0 6px rgba(57,255,20,0.5); }

.bottom-row { display:flex; align-items:center; gap:12px; border-top:1px solid #888; padding-top:20px; opacity:0.8; }
.dot { width:6px; height:6px; border-radius:50%; background:#39ff14; box-shadow:0 0 6px rgba(57,255,20,0.8); flex-shrink:0; }
.updated { font-size:11px; letter-spacing:0.25em; color:#39ff14; text-transform:uppercase; text-shadow:0 0 8px rgba(57,255,20,0.5); }
</style>
</head>
<body>
<div class="card">
  <div class="top-row">
    <div class="city">Kofu, Japan</div>
    <div class="label">Weather</div>
  </div>
  <div class="main-row">
    <div class="today">
      <div class="cur-icon" id="cur-icon">—</div>
      <div class="cur-info">
        <div class="cur-temp" id="cur-temp">—<sup>°</sup></div>
        <div class="cur-desc" id="cur-desc">Loading...</div>
        <div class="cur-range" id="cur-range"></div>
      </div>
    </div>
    <div class="divider-v"></div>
    <div class="tomorrow">
      <div class="tmr-label">Tomorrow</div>
      <div class="tmr-icon" id="tmr-icon">—</div>
      <div class="tmr-temps">
        <span class="tmr-high" id="tmr-high">—°</span>
        <span class="tmr-low" id="tmr-low">—°</span>
      </div>
      <div class="tmr-precip" id="tmr-precip">—%</div>
    </div>
  </div>
  <div class="bottom-row">
    <div class="dot"></div>
    <div class="updated" id="updated">—</div>
  </div>
</div>
<script>
var LAT=35.6635, LON=138.5684;

function weatherInfo(code){
  if(code===0)  return {icon:'☀️', desc:'Clear'};
  if(code<=2)   return {icon:'🌤️', desc:'Partly Cloudy'};
  if(code===3)  return {icon:'☁️', desc:'Cloudy'};
  if(code<=49)  return {icon:'🌫️', desc:'Foggy'};
  if(code<=59)  return {icon:'🌦️', desc:'Drizzle'};
  if(code<=69)  return {icon:'🌧️', desc:'Rain'};
  if(code<=79)  return {icon:'❄️', desc:'Snow'};
  if(code<=82)  return {icon:'🌧️', desc:'Showers'};
  if(code<=86)  return {icon:'🌨️', desc:'Snow Showers'};
  if(code<=99)  return {icon:'⛈️', desc:'Thunderstorm'};
  return {icon:'🌡️', desc:'Unknown'};
}

async function fetchWeather(){
  try {
    var url='https://api.open-meteo.com/v1/forecast'
      +'?latitude='+LAT+'&longitude='+LON
      +'&current=temperature_2m,weathercode'
      +'&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max'
      +'&timezone=Asia%2FTokyo'
      +'&forecast_days=2';
    var res=await fetch(url);
    var data=await res.json();

    var cur=data.current;
    var info=weatherInfo(cur.weathercode);
    document.getElementById('cur-icon').textContent=info.icon;
    document.getElementById('cur-temp').innerHTML=Math.round(cur.temperature_2m)+'<sup>°</sup>';
    document.getElementById('cur-desc').textContent=info.desc;

    var todayHigh=Math.round(data.daily.temperature_2m_max[0]);
    var todayLow=Math.round(data.daily.temperature_2m_min[0]);
    document.getElementById('cur-range').innerHTML=
      '<span>H</span> '+todayHigh+'°  <span>L</span> '+todayLow+'°';

    var tmrInfo=weatherInfo(data.daily.weathercode[1]);
    document.getElementById('tmr-icon').textContent=tmrInfo.icon;
    document.getElementById('tmr-high').textContent=Math.round(data.daily.temperature_2m_max[1])+'°';
    document.getElementById('tmr-low').textContent=Math.round(data.daily.temperature_2m_min[1])+'°';
    document.getElementById('tmr-precip').textContent=(data.daily.precipitation_probability_max[1]||0)+'% rain';

    var now=new Date();
    document.getElementById('updated').textContent=
      String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' updated';

  } catch(e) {
    document.getElementById('cur-desc').textContent='N/A';
  }
}

fetchWeather();
setInterval(fetchWeather,600000);
</script>
</body>
</html>
